<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Silhouette test</title>
<style>
body { display: flex; gap: 2rem; padding: 2rem; background: #1a1f2a; font-family: system-ui; color: #e8ecf4; }
.card { background: #242a38; border-radius: 12px; padding: 1rem; text-align: center; }
.card h3 { margin: 0 0 .5rem; font-size: .9rem; }
canvas { border: 1px solid #3a4256; border-radius: 8px; background: #0f1218; }
</style>
</head>
<body>
<div class="card">
  <h3>Front (A-pose)</h3>
  <canvas id="front" width="260" height="420"></canvas>
</div>
<div class="card">
  <h3>Profile (side)</h3>
  <canvas id="profile" width="260" height="420"></canvas>
</div>
<div class="card">
  <h3>Profile arm</h3>
  <canvas id="arm" width="260" height="420"></canvas>
</div>
<script>
const FRONT_PTS = [
  [.500,.005],[.560,.015],[.580,.040],[.570,.075],[.535,.095],
  [.550,.115],[.660,.130],
  [.730,.155],[.810,.190],[.880,.225],[.935,.260],[.960,.290],
  [.940,.280],[.875,.250],[.805,.220],[.740,.190],
  [.670,.165],[.620,.200],[.590,.280],[.565,.370],
  [.600,.430],[.620,.470],
  [.625,.540],[.620,.620],[.620,.700],[.615,.780],[.610,.855],[.610,.910],
  [.620,.950],[.640,.975],[.620,.990],
  [.570,.990],[.560,.960],[.555,.910],[.555,.855],[.560,.780],
  [.565,.700],[.565,.620],[.560,.540],[.545,.470],
  [.500,.450],
  [.455,.470],[.440,.540],[.435,.620],[.435,.700],[.440,.780],
  [.445,.855],[.445,.910],[.440,.960],[.430,.990],
  [.380,.990],[.360,.975],[.390,.950],
  [.390,.910],[.390,.855],[.385,.780],[.380,.700],[.380,.620],[.375,.540],
  [.380,.470],[.400,.430],[.435,.370],
  [.410,.280],[.380,.200],[.330,.165],
  [.260,.190],[.195,.220],[.125,.250],[.065,.280],
  [.040,.290],[.065,.260],[.120,.225],[.190,.190],[.270,.155],
  [.340,.130],[.450,.115],[.465,.095],
  [.430,.075],[.420,.040],[.440,.015],
];

const PROFILE_PTS = [
  [.47,.005],[.51,.002],[.55,.002],[.58,.008],[.61,.018],
  [.63,.030],[.645,.045],[.65,.058],[.645,.068],[.63,.076],
  [.61,.082],
  [.58,.088],[.55,.095],[.54,.102],
  [.56,.115],[.60,.135],[.64,.160],[.66,.185],
  [.65,.220],[.63,.265],[.61,.310],[.59,.355],
  [.59,.390],[.60,.420],[.595,.460],[.59,.500],
  [.585,.540],[.58,.580],[.575,.620],[.57,.660],
  [.56,.720],[.55,.790],[.545,.850],[.55,.900],
  [.565,.945],[.585,.970],[.58,.990],
  [.54,.990],
  [.50,.990],[.465,.970],[.45,.945],[.44,.900],
  [.445,.850],[.45,.790],[.45,.720],
  [.44,.660],[.435,.620],[.44,.580],[.45,.540],
  [.46,.500],[.465,.460],[.47,.420],
  [.46,.390],[.43,.360],[.39,.335],[.36,.310],
  [.36,.275],[.37,.240],[.39,.205],
  [.40,.170],[.42,.140],[.43,.115],
  [.43,.098],[.42,.080],[.40,.060],
  [.39,.040],[.40,.022],[.43,.010],
];

const PROFILE_ARM_PTS = [
  [.65,.175],[.93,.295],
];

function draw(canvasId, pts, closed = true) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const pad = 10;
  const bw = W - pad*2, bh = H - pad*2;

  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = 'rgba(91,140,255,0.9)';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.setLineDash([6,4]);

  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const x = pad + pts[i][0] * bw;
    const y = pad + pts[i][1] * bh;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  if (closed) ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
  if (closed) {
    ctx.fillStyle = 'rgba(91,140,255,0.07)';
    ctx.fill();
  }

  ctx.fillStyle = 'rgba(255,100,100,0.6)';
  for (let i = 0; i < pts.length; i++) {
    const x = pad + pts[i][0] * bw;
    const y = pad + pts[i][1] * bh;
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI*2);
    ctx.fill();
  }
}

draw('front', FRONT_PTS);
draw('profile', PROFILE_PTS);
draw('arm', PROFILE_ARM_PTS, false);
</script>
</body>
</html>
